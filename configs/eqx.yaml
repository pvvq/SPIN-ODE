default: &default
  seed: 42

  obs_num: 1
  obs_sample: 4
  obs_noise: 0.0

  # model
  solver:
    rtol: 1.e-6
    atol: 1.e-7
    max_steps: 100000
    checkpoints: 10000
  
  ckpt_keep: 3

traj_fit:
  <<: *default
  epochs: 2000
  learning_rate: 1.e-2
  test_interval: 50
  ckpt_interval: 10

est_rate_dydt: &est_rate_dydt
  <<: *default
  epochs: 5000
  learning_rate: 1.e-2
  test_interval: 100
  ckpt_interval: 10

est_rate_neural_ode:
  <<: *est_rate_dydt
  dydt: "neural_ode"
  neural_ode_ckpt: experiments/traj_fit/checkpoints

est_rate_finite_diff:
  <<: *est_rate_dydt
  dydt: "finite_diff"

est_rate_traj:
  <<: *default
  k_noise: 1.e-3

  epochs: 2000
  learning_rate: 1.e-3
  test_interval: 100
  ckpt_interval: 10
